services:
  - type: web
    name: resume-analyzer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "50"
    plan: free